name: Deploy Auth Service v2.0

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      PROJECT_NAME: Queue-Auth-Service
      SERVER_URL: 3.81.88.247:8444

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"

      - name: Capture Start Time
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Build Auth Service
        run: mvn clean package -DskipTests

      - name: Copy Auth Service to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "3.81.88.247"
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/*.jar,Dockerfile"
          target: "~/app/Auth-Service"

      - name: SSH and Restart Auth Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "3.81.88.247"
          username: "ubuntu"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app/Auth-Service

            sudo docker rm -f auth-service || true

            PID=$(sudo lsof -t -i:8444 || true)
            if [ -n "$PID" ]; then
              sudo kill -9 $PID || true
            fi

            sleep 2

            if sudo lsof -i :8444; then
              echo "ERROR: Port still in use"
              exit 1
            fi

            sudo docker build -t auth-service .

            sudo docker run -d \
              --name auth-service \
              --restart unless-stopped \
              -p 8444:8444 \
              auth-service

            sudo docker ps
            sudo docker logs --tail=80 auth-service

      - name: Get Formatted Time & Duration
        if: always()
        id: info
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo "DEPLOY_TIME=$(TZ='Asia/Phnom_Penh' date +'%Y-%m-%d %I:%M %p')" >> $GITHUB_OUTPUT
          echo "DURATION=$((DURATION / 60))m $((DURATION % 60))s" >> $GITHUB_OUTPUT

      - name: Send Telegram Notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ${{ job.status == 'success' && '🙌 *Hello Team ខ្សោយ*' || '❌ *😡 ចប់! ថាខ្សោយខ្សោយមេន Team នេះ!*' }}

            ${{ job.status == 'success' && '🚀 *Auto-Deployment Successful!*' || '❌ *Auto-Deployment Failed!*' }}

            📁 *Project:* ${{ env.PROJECT_NAME }}
            🌐 *Server:* ${{ env.SERVER_URL }}
            🌿 *Branch:* ${{ github.ref_name }}
            👤 *Author:* ${{ github.actor }}
            📝 *Commit:* ${{ github.event.head_commit.message }}
            ⏰ *Time:* ${{ steps.info.outputs.DEPLOY_TIME }}
            ⏱️ *Duration:* ${{ steps.info.outputs.DURATION }}

            ${{ job.status == 'success' && '✅ *Status:* Online and healthy.' || '⚠️ *Status:* Failed. Please check logs!' }}
