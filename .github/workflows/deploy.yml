name: CI/CD Deploy Auth Service to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set start time
      run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Deploy to Auth Server
      uses: appleboy/ssh-action@master
      with:
        host: ec2-54-234-102-50.compute-1.amazonaws.com
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd Queue-Auth-Service
          git pull origin main
          mvn clean package -DskipTests
          sudo systemctl restart auth-service

    - name: Get Formatted Time & Duration
      if: always()
      id: info
      run: |
        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))
        echo "DEPLOY_TIME=$(TZ='Asia/Bangkok' date +'%Y-%m-%d %I:%M %p')" >> $GITHUB_OUTPUT
        echo "DURATION=$((DURATION / 60))m $((DURATION % 60))s" >> $GITHUB_OUTPUT

    - name: Send Success Telegram Notification
      if: success()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          🚀 *Auto-Deployment Successful!*
          
          📁 *Project:* Queue-Auth-Service
          🌐 *Server:* 54.234.102.50:8080
          🌿 *Branch:* ${{ github.ref_name }}
          👤 *Author:* ${{ github.actor }}
          📝 *Commit:* ${{ github.event.head_commit.message }}
          ⏰ *Time:* ${{ steps.info.outputs.DEPLOY_TIME }}
          ⏱️ *Duration:* ${{ steps.info.outputs.DURATION }}
          
          ✅ *Status:* Online and healthy.

    - name: Send Failure Telegram Notification
      if: failure()
      uses: appleboy/telegram-action@master
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          ⚠️ *Deployment FAILED!*
          
          📁 *Project:* Queue-Auth-Service
          🌐 *Server:* 54.234.102.50:8080
          👤 *Author:* ${{ github.actor }}
          ⏰ *Time:* ${{ steps.info.outputs.DEPLOY_TIME }}
          ⏱️ *Duration:* ${{ steps.info.outputs.DURATION }}
          
          ❌ *Status:* Action Required. Check logs on GitHub!
