version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-xe
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: password123
      APP_USER: QUEUE_ADMIN
      APP_USER_PASSWORD: password123
    volumes:
      - oracle_data:/opt/oracle/oradata
    networks:
      - microservices-net
    restart: unless-stopped

volumes:
  oracle_data:

networks:
  microservices-net:
    driver: bridge